<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card — Starter (has bugs)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f6f8;
    margin: 0;
    padding: 40px;
    display: flex;
    justify-content: center;
    Align-items: center;
  
  }

  .card {
    width: 300px;
    height: 320px;
    background: #ffffff;
    border: 2px solid #dfe1e6;
    border-radius: 16px; 
    padding: 24px;
    box-sizing: border-box;
    text-align: center; 
  }

  .avatar {
    width: 90px;
    height: 90px;
    background: #0f3460;
    border-radius: 50%; 
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 22px;
    margin: 0 auto 12px auto;
  }

  .name {
    font-size: 22px;
    font-weight: bold;
    color: #1a1a2e;
    margin: 4px 0; 
  }

  .role {
    font-size: 15px;
    color: #6e6e78;
    margin: 0 0 12px 0;
  }

  .divider {
    border: none;
    border-top: 1px solid #dfe1e6;
    margin: 24px 0;
  }

  .btn {
    display: block;
    width: 180px;
    height: 44px;
    line-height: 44px;
    text-align: center;
    background: #533483; 
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    margin: 20px auto 0 auto;
    cursor: pointer;
  }
    .btn:hover {
      background: #452a6a; 
    }
  
</style>
</head>
<body>

  <div class="card">
    <div class="avatar">AK</div>
    <div class="name">Ayesha Khan</div>
    <div class="role">Product Designer</div>
   <hr class="divider">
    <button class="btn">View Profile</button>
  </div>

</body>
</html>
